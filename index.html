<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLO Matrix & Leerdoelen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans antialiased">

    <header class="bg-gradient-to-r from-indigo-700 to-blue-800 text-white shadow-md p-6 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight"><i class="fa-solid fa-map-location-dot mr-3"></i>SLO Smart Dashboard</h1>
        <p class="text-indigo-100 mt-2 text-sm md:text-base">Upload je bestand en bepaal zelf hoe de kolommen gekoppeld worden.</p>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="text-center border-dashed border-2 border-indigo-200 p-6 rounded-xl bg-slate-50/50">
                <h2 class="text-lg font-bold text-slate-900 mb-1">
                    <i class="fa-solid fa-file-excel text-emerald-600 mr-2"></i> Stap 1: Selecteer je SLO Excel-bestand
                </h2>
                <div class="max-w-md mx-auto mt-4">
                    <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" onchange="processExcelFile(event)" 
                           class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer shadow-sm" />
                </div>
                <div id="file-status" class="mt-3 text-sm font-semibold text-emerald-600 hidden"></div>
            </div>

            <div id="mapping-panel" class="hidden mt-6 pt-6 border-t border-slate-200">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3"><i class="fa-solid fa-gears text-indigo-500 mr-1"></i> Controleer de kolom-koppeling:</h3>
                <p class="text-xs text-slate-400 mb-4">Staan er gekke zinnen bij de filters? Verander dan hieronder de kolom naar de juiste.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
                    <div>
                        <label class="block font-semibold text-slate-700 mb-1">Vak / Sector:</label>
                        <select id="map-vak" onchange="applyMapping()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 font-medium text-indigo-700"></select>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-700 mb-1">Niveau (bijv. havo):</label>
                        <select id="map-niveau" onchange="applyMapping()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 font-medium text-indigo-700"></select>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-700 mb-1">Domein / Onderwerp:</label>
                        <select id="map-domein" onchange="applyMapping()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 font-medium text-indigo-700"></select>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-700 mb-1">Inhoud / Leerdoel:</label>
                        <select id="map-doel" onchange="applyMapping()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-600 font-medium text-indigo-700"></select>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-core" class="opacity-40 pointer-events-none transition-all duration-300">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center">
                    <i class="fa-solid fa-filter text-indigo-600 mr-2"></i> Stap 2: Filters & Weergave
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                    
                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Gevonden Vakken</label>
                        <div id="dynamic-vak-container" class="space-y-2 bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm max-h-40 overflow-y-auto shadow-inner">
                        </div>
                    </div>

                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Gevonden Niveaus</label>
                        <div id="dynamic-niveau-container" class="space-y-2 bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm max-h-40 overflow-y-auto shadow-inner">
                        </div>
                    </div>

                    <div class="md:col-span-6 flex flex-col h-full justify-between">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Vrij Zoeken (Onderwerp)</label>
                            <div class="relative mb-2">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                                <input type="text" id="free-search" oninput="runFiltering()" placeholder="Zoek op tekst (bijv. klimaat, breuken)..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 p-3 text-sm focus:outline-none focus:border-indigo-600 transition">
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Lay-out</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                                <button onclick="toggleViewMode('cards')" id="btn-view-cards" class="bg-white text-indigo-700 shadow-sm text-xs font-bold py-2.5 rounded-lg transition">
                                    <i class="fa-solid fa-address-card mr-1"></i> Leerdoelkaarten
                                </button>
                                <button onclick="toggleViewMode('matrix')" id="btn-view-matrix" class="text-slate-600 text-xs font-bold py-2.5 rounded-lg transition">
                                    <i class="fa-solid fa-table-cells mr-1"></i> Matrix
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-slate-900 text-white p-2.5 mt-6 rounded-xl text-center text-sm font-mono shadow-inner w-full flex justify-center items-center gap-3">
                    <span id="counter-label">0 resultaten zichtbaar</span>
                </div>
            </div>

            <div id="view-container-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="view-container-matrix" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm overflow-x-auto p-2"></div>

        </div>
    </main>

    <script>
        let rawMatrixData = [];
        let excelHeaders = [];
        let parsedObjectsDataset = [];
        let activeViewMode = 'cards';

        function processExcelFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Belangrijk: we lezen het in als een rauwe matrix (array van arrays) om de lege regels bovenaan te omzeilen
                const rawMatrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                if (rawMatrix.length === 0) return alert("Bestand is leeg!");

                // Zoek de eerste echte rij met data (die fungeert als de kolomkoppen)
                let headerRowIndex = 0;
                for (let i = 0; i < Math.min(rawMatrix.length, 10); i++) {
                    const filledCells = rawMatrix[i].filter(cell => cell !== "").length;
                    if (filledCells >= 2) {
                        headerRowIndex = i;
                        break;
                    }
                }

                // Haal de headers op. Als een kolom geen naam heeft, noemen we hem Kolom 1, Kolom 2 etc.
                excelHeaders = rawMatrix[headerRowIndex].map((h, i) => h ? String(h).trim() : `Kolom ${i+1}`);
                rawMatrixData = rawMatrix.slice(headerRowIndex + 1).filter(row => row.some(cell => cell !== ""));

                populateDropdown('map-vak', excelHeaders, ['vak', 'sector', 'leergebied']);
                populateDropdown('map-niveau', excelHeaders, ['niveau', 'fase', 'leerjaar']);
                populateDropdown('map-domein', excelHeaders, ['domein', 'rubriek', 'onderwerp', 'leerlijn']);
                populateDropdown('map-doel', excelHeaders, ['doel', 'inhoud', 'omschrijving', 'term', 'kolom']);

                document.getElementById('file-status').innerHTML = `<i class="fa-solid fa-circle-check"></i> ${file.name} succesvol ingeladen!`;
                document.getElementById('file-status').classList.remove('hidden');
                document.getElementById('dashboard-core').classList.remove('opacity-40', 'pointer-events-none');
                document.getElementById('mapping-panel').classList.remove('hidden');
                
                applyMapping();
            };
            reader.readAsArrayBuffer(file);
        }

        function populateDropdown(selectId, headers, keywords) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            let targetIdx = -1;

            headers.forEach((h, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.text = h;
                
                // Slimme match
                if (targetIdx === -1) {
                    for(let kw of keywords) {
                        if (h.toLowerCase().includes(kw)) {
                            targetIdx = idx;
                            break;
                        }
                    }
                }
                select.appendChild(option);
            });

            // Als hij niks vindt, geef hem een logische fallback
            if (targetIdx === -1) {
                if(selectId === 'map-vak') targetIdx = 0;
                if(selectId === 'map-niveau') targetIdx = 1 % headers.length;
                if(selectId === 'map-domein') targetIdx = 2 % headers.length;
                if(selectId === 'map-doel') targetIdx = headers.length - 1; // Doel staat vaak achteraan
            }
            select.value = targetIdx;
        }

        function applyMapping() {
            const idxVak = parseInt(document.getElementById('map-vak').value);
            const idxNiveau = parseInt(document.getElementById('map-niveau').value);
            const idxDomein = parseInt(document.getElementById('map-domein').value);
            const idxDoel = parseInt(document.getElementById('map-doel').value);

            // Zet de rauwe rijen om in schone objecten met de NIEUWE koppelingen
            parsedObjectsDataset = rawMatrixData.map(row => {
                return {
                    vak: String(row[idxVak] || "").trim(),
                    niveau: String(row[idxNiveau] || "").trim(),
                    domein: String(row[idxDomein] || "").trim(),
                    doel: String(row[idxDoel] || "").trim(),
                    fullText: row.join(" ").toLowerCase()
                };
            });

            buildDynamicFilters();
            runFiltering();
        }

        function buildDynamicFilters() {
            let setVakken = new Set();
            let setNiveaus = new Set();

            parsedObjectsDataset.forEach(obj => {
                if (obj.vak && obj.vak !== "-") setVakken.add(obj.vak);
                
                if (obj.niveau && obj.niveau !== "-") {
                    obj.niveau.split(',').forEach(p => {
                        let clean = p.trim();
                        if(clean) setNiveaus.add(clean);
                    });
                }
            });

            // Bouw Checkboxes voor Vakken
            const vakContainer = document.getElementById('dynamic-vak-container');
            vakContainer.innerHTML = '';
            if(setVakken.size === 0) vakContainer.innerHTML = '<span class="text-slate-400 italic text-xs">Geen vakken gevonden in deze kolom.</span>';
            Array.from(setVakken).sort().forEach(v => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2 cursor-pointer hover:text-indigo-600 transition font-medium text-slate-700 text-xs";
                label.innerHTML = `<input type="checkbox" class="dyn-vak-cb rounded border-slate-300 text-indigo-600 mt-0.5" value="${v.toLowerCase()}" onchange="runFiltering()"> <span class="leading-tight">${v}</span>`;
                vakContainer.appendChild(label);
            });

            // Bouw Checkboxes voor Niveaus
            const nivContainer = document.getElementById('dynamic-niveau-container');
            nivContainer.innerHTML = '';
            if(setNiveaus.size === 0) nivContainer.innerHTML = '<span class="text-slate-400 italic text-xs">Geen niveaus gevonden in deze kolom.</span>';
            Array.from(setNiveaus).sort().forEach(n => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2 cursor-pointer hover:text-indigo-600 transition font-medium text-slate-700 text-xs";
                label.innerHTML = `<input type="checkbox" class="dyn-niv-cb rounded border-slate-300 text-indigo-600 mt-0.5" value="${n.toLowerCase()}" onchange="runFiltering()"> <span class="leading-tight">${n}</span>`;
                nivContainer.appendChild(label);
            });
        }

        function runFiltering() {
            const query = document.getElementById('free-search').value.toLowerCase().trim();
            const checkedVakken = Array.from(document.querySelectorAll('.dyn-vak-cb:checked')).map(cb => cb.value);
            const checkedNiveaus = Array.from(document.querySelectorAll('.dyn-niv-cb:checked')).map(cb => cb.value);

            const gefilterdeData = parsedObjectsDataset.filter(obj => {
                // Check vrije tekst
                let matchQuery = query === "" || obj.fullText.includes(query);

                // Check Vak
                let matchVak = checkedVakken.length === 0;
                if (checkedVakken.length > 0) {
                    matchVak = checkedVakken.some(v => obj.vak.toLowerCase().includes(v));
                }

                // Check Niveau
                let matchNiveau = checkedNiveaus.length === 0;
                if (checkedNiveaus.length > 0) {
                    matchNiveau = checkedNiveaus.some(n => obj.niveau.toLowerCase().includes(n));
                }

                return matchQuery && matchVak && matchNiveau;
            });

            document.getElementById('counter-label').innerText = `${gefilterdeData.length} resultaten zichtbaar`;

            if (activeViewMode === 'cards') renderCards(gefilterdeData);
            else renderMatrix(gefilterdeData);
        }

        function toggleViewMode(mode) {
            activeViewMode = mode;
            const btnCards = document.getElementById('btn-view-cards');
            const btnMatrix = document.getElementById('btn-view-matrix');
            
            if (mode === 'cards') {
                btnCards.classList.replace('text-slate-600', 'text-indigo-700');
                btnCards.classList.replace('bg-transparent', 'bg-white');
                btnCards.classList.add('shadow-sm');
                btnMatrix.classList.replace('text-indigo-700', 'text-slate-600');
                btnMatrix.classList.replace('bg-white', 'bg-transparent');
                btnMatrix.classList.remove('shadow-sm');
                
                document.getElementById('view-container-cards').classList.remove('hidden');
                document.getElementById('view-container-matrix').classList.add('hidden');
            } else {
                btnMatrix.classList.replace('text-slate-600', 'text-indigo-700');
                btnMatrix.classList.replace('bg-transparent', 'bg-white');
                btnMatrix.classList.add('shadow-sm');
                btnCards.classList.replace('text-indigo-700', 'text-slate-600');
                btnCards.classList.replace('bg-white', 'bg-transparent');
                btnCards.classList.remove('shadow-sm');
                
                document.getElementById('view-container-matrix').classList.remove('hidden');
                document.getElementById('view-container-cards').classList.add('hidden');
            }
            runFiltering();
        }

        function renderCards(data) {
            const container = document.getElementById('view-container-cards');
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full p-8 text-center text-slate-400 bg-white rounded-xl border border-slate-200">Geen leerdoelen gevonden. Pas je filters of kolomkoppeling aan.</div>`;
                return;
            }

            const displayData = data.slice(0, 150);

            displayData.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-500 flex flex-col justify-between hover:shadow-md transition";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3 gap-2">
                            <span class="bg-indigo-50 text-indigo-700 text-2xs font-bold px-2 py-1 rounded-md uppercase tracking-wider">${item.vak || 'Algemeen'}</span>
                            <span class="text-slate-400 text-3xs font-mono text-right mt-1 leading-tight">${item.niveau}</span>
                        </div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">${item.domein || '-'}</h4>
                        <p class="text-sm font-medium text-slate-800 leading-relaxed">${item.doel || 'Geen tekst beschikbaar'}</p>
                    </div>
                `;
                container.appendChild(card);
            });
            
            if(data.length > 150) {
                container.innerHTML += `<div class="col-span-full p-4 text-center text-xs text-slate-500 bg-indigo-50/50 rounded-xl border border-indigo-100">Er zijn nog ${data.length - 150} extra doelen. Maak een selectie om ze te zien.</div>`;
            }
        }

        function renderMatrix(data) {
            const container = document.getElementById('view-container-matrix');
            if(data.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-400">Geen data gevonden. Pas je filters of kolomkoppeling aan.</div>`;
                return;
            }

            let html = `<table class="w-full text-left text-xs border-collapse"><thead><tr class="bg-slate-100 border-b border-slate-200 text-slate-700 uppercase tracking-wider">
                <th class="p-3 font-bold border-r border-slate-200">Vak</th>
                <th class="p-3 font-bold border-r border-slate-200">Niveau</th>
                <th class="p-3 font-bold border-r border-slate-200">Domein</th>
                <th class="p-3 font-bold">Leerdoel / Inhoud</th>
            </tr></thead><tbody class="divide-y divide-slate-100">`;

            data.slice(0, 200).forEach(item => {
                html += `<tr class="hover:bg-slate-50 transition align-top">
                    <td class="p-3 text-slate-600 font-semibold border-r border-slate-200 whitespace-nowrap">${item.vak}</td>
                    <td class="p-3 text-slate-500 border-r border-slate-200">${item.niveau}</td>
                    <td class="p-3 text-slate-600 font-medium border-r border-slate-200 max-w-[150px] truncate" title="${item.domein}">${item.domein}</td>
                    <td class="p-3 text-slate-800 leading-relaxed">${item.doel}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            if(data.length > 200) html += `<div class="p-3 text-center text-xs text-slate-500 bg-indigo-50/50 border-t border-indigo-100">Tabel afgekapt op 200 rijen wegens prestaties.</div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
