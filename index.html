<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLO Matrix & Leerdoelen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans antialiased">

    <header class="bg-gradient-to-r from-indigo-700 to-blue-800 text-white shadow-md p-6 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight"><i class="fa-solid fa-wand-magic-sparkles mr-3"></i>SLO Smart Dashboard</h1>
        <p class="text-indigo-100 mt-2 text-sm md:text-base">Upload je bestand. De filters (Vakken & Niveaus) worden automatisch voor je opgebouwd!</p>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 text-center border-dashed border-2 border-indigo-200">
            <h2 class="text-lg font-bold text-slate-900 mb-1">
                <i class="fa-solid fa-file-excel text-emerald-600 mr-2"></i> Stap 1: Selecteer je SLO Excel-bestand
            </h2>
            <div class="max-w-md mx-auto mt-4">
                <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" onchange="processExcelFile(event)" 
                       class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer shadow-sm" />
            </div>
            <div id="file-status" class="mt-3 text-sm font-semibold text-emerald-600 hidden"></div>
        </div>

        <div id="dashboard-core" class="opacity-40 pointer-events-none transition-all duration-300">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                <h2 class="text-base font-bold text-slate-900 mb-4 flex items-center">
                    <i class="fa-solid fa-filter text-indigo-600 mr-2"></i> Stap 2: Combineer je filters
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">1. Kies Vak(ken)</label>
                        <div id="dynamic-vak-container" class="space-y-2 bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto shadow-inner">
                            <span class="text-slate-400 text-xs italic">Wacht op bestand...</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">2. Kies Niveau(s)</label>
                        <div id="dynamic-niveau-container" class="space-y-2 bg-slate-50 p-3 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto shadow-inner">
                            <span class="text-slate-400 text-xs italic">Wacht op bestand...</span>
                        </div>
                    </div>

                    <div class="flex flex-col h-full justify-between">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">3. Vrij Zoeken (Onderwerp)</label>
                            <div class="relative mb-2">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                                <input type="text" id="free-search" oninput="runFiltering()" placeholder="Zoek op tekst (bijv. breuken)..." class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 p-3 text-sm focus:outline-none focus:border-indigo-600 transition">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-4">Weergave</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                                <button onclick="toggleViewMode('cards')" id="btn-view-cards" class="bg-white text-indigo-700 shadow-sm text-xs font-bold py-2.5 rounded-lg transition">
                                    <i class="fa-solid fa-address-card mr-1"></i> Kaarten
                                </button>
                                <button onclick="toggleViewMode('matrix')" id="btn-view-matrix" class="text-slate-600 text-xs font-bold py-2.5 rounded-lg transition">
                                    <i class="fa-solid fa-table-cells mr-1"></i> Matrix
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-slate-900 text-white p-2.5 mt-6 rounded-xl text-center text-sm font-mono shadow-inner w-full flex justify-center items-center gap-3">
                    <i class="fa-solid fa-chart-simple text-indigo-400"></i>
                    <span id="counter-label">0 resultaten zichtbaar</span>
                </div>
            </div>

            <div id="view-container-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="view-container-matrix" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm overflow-x-auto p-2"></div>

        </div>
    </main>

    <script>
        let rawDataObjects = [];
        let activeViewMode = 'cards';
        
        let colVak = "";
        let colNiveau = "";
        let colDomein = "";
        let colDoel = "";

        function processExcelFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                let rawJson = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                if (rawJson.length === 0) return alert("Bestand is leeg!");

                const headers = Object.keys(rawJson[0]);
                
                // --- SLIMME KOLOM DETECTIE ---
                colVak = headers.find(h => h.toUpperCase().includes('VAK')) || headers[0];
                colNiveau = headers.find(h => h.toUpperCase().includes('NIVEAU')) || headers.find(h => h.toUpperCase().includes('FASE')) || headers[1];
                colDomein = headers.find(h => h.toUpperCase().includes('DOMEIN')) || headers.find(h => h.toUpperCase().includes('LABEL')) || headers[2];
                colDoel = headers.find(h => h.toUpperCase().includes('DOEL')) || headers.find(h => h.toUpperCase().includes('TERM')) || headers[3];

                rawDataObjects = rawJson;

                buildDynamicFilters();

                document.getElementById('file-status').innerHTML = `<i class="fa-solid fa-circle-check"></i> ${file.name} succesvol ingeladen!`;
                document.getElementById('file-status').classList.remove('hidden');
                document.getElementById('dashboard-core').classList.remove('opacity-40', 'pointer-events-none');
                
                runFiltering();
            };
            reader.readAsArrayBuffer(file);
        }

        function buildDynamicFilters() {
            let setVakken = new Set();
            let setNiveaus = new Set();

            rawDataObjects.forEach(row => {
                // Verzamel unieke vakken en splits ze als ze gecombineerd zijn met komma's
                let vakStr = String(row[colVak] || "");
                if (vakStr && vakStr !== "undefined") {
                    vakStr.split(',').forEach(v => {
                        let cleanVak = v.trim();
                        if(cleanVak) setVakken.add(cleanVak);
                    });
                }

                // Verzamel unieke niveaus
                let nivStr = String(row[colNiveau] || "");
                if (nivStr && nivStr !== "undefined") {
                    nivStr.split(',').forEach(p => {
                        let cleanPart = p.trim();
                        if(cleanPart) setNiveaus.add(cleanPart);
                    });
                }
            });

            // Bouw Checkboxes voor Vakken
            const vakContainer = document.getElementById('dynamic-vak-container');
            vakContainer.innerHTML = '';
            Array.from(setVakken).sort().forEach(v => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2 cursor-pointer hover:text-indigo-600 transition font-medium text-slate-700 text-xs";
                label.innerHTML = `<input type="checkbox" class="dyn-vak-cb rounded border-slate-300 text-indigo-600 mt-0.5" value="${v.toLowerCase()}" onchange="runFiltering()"> <span class="leading-tight">${v}</span>`;
                vakContainer.appendChild(label);
            });

            // Bouw Checkboxes voor Niveaus
            const nivContainer = document.getElementById('dynamic-niveau-container');
            nivContainer.innerHTML = '';
            Array.from(setNiveaus).sort().forEach(n => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2 cursor-pointer hover:text-indigo-600 transition font-medium text-slate-700 text-xs";
                label.innerHTML = `<input type="checkbox" class="dyn-niv-cb rounded border-slate-300 text-indigo-600 mt-0.5" value="${n.toLowerCase()}" onchange="runFiltering()"> <span class="leading-tight">${n}</span>`;
                nivContainer.appendChild(label);
            });
        }

        function runFiltering() {
            const query = document.getElementById('free-search').value.toLowerCase().trim();
            const checkedVakken = Array.from(document.querySelectorAll('.dyn-vak-cb:checked')).map(cb => cb.value);
            const checkedNiveaus = Array.from(document.querySelectorAll('.dyn-niv-cb:checked')).map(cb => cb.value);

            const gefilterdeData = rawDataObjects.filter(row => {
                // 1. Zoekbalk Filter
                let rowTekst = Object.values(row).join(" ").toLowerCase();
                let matchQuery = query === "" || rowTekst.includes(query);

                // 2. Vakken Filter (Als niks is aangevinkt, toon alles)
                let rowVakText = String(row[colVak] || "").toLowerCase();
                let matchVak = checkedVakken.length === 0;
                if (checkedVakken.length > 0) {
                    for (let v of checkedVakken) {
                        if (rowVakText.includes(v)) {
                            matchVak = true; break;
                        }
                    }
                }

                // 3. Niveaus Filter (Als niks is aangevinkt, toon alles)
                let rowNiveauText = String(row[colNiveau] || "").toLowerCase();
                let matchNiveau = checkedNiveaus.length === 0;
                if (checkedNiveaus.length > 0) {
                    for (let nv of checkedNiveaus) {
                        if (rowNiveauText.includes(nv)) {
                            matchNiveau = true; break;
                        }
                    }
                }

                return matchQuery && matchVak && matchNiveau;
            });

            document.getElementById('counter-label').innerText = `${gefilterdeData.length} resultaten gevonden voor jouw selectie`;

            if (activeViewMode === 'cards') renderCards(gefilterdeData);
            else renderMatrix(gefilterdeData);
        }

        function toggleViewMode(mode) {
            activeViewMode = mode;
            const btnCards = document.getElementById('btn-view-cards');
            const btnMatrix = document.getElementById('btn-view-matrix');
            
            if (mode === 'cards') {
                btnCards.classList.replace('text-slate-600', 'text-indigo-700');
                btnCards.classList.replace('bg-transparent', 'bg-white');
                btnCards.classList.add('shadow-sm');
                
                btnMatrix.classList.replace('text-indigo-700', 'text-slate-600');
                btnMatrix.classList.replace('bg-white', 'bg-transparent');
                btnMatrix.classList.remove('shadow-sm');
                
                document.getElementById('view-container-cards').classList.remove('hidden');
                document.getElementById('view-container-matrix').classList.add('hidden');
            } else {
                btnMatrix.classList.replace('text-slate-600', 'text-indigo-700');
                btnMatrix.classList.replace('bg-transparent', 'bg-white');
                btnMatrix.classList.add('shadow-sm');
                
                btnCards.classList.replace('text-indigo-700', 'text-slate-600');
                btnCards.classList.replace('bg-white', 'bg-transparent');
                btnCards.classList.remove('shadow-sm');
                
                document.getElementById('view-container-matrix').classList.remove('hidden');
                document.getElementById('view-container-cards').classList.add('hidden');
            }
            runFiltering();
        }

        function renderCards(data) {
            const container = document.getElementById('view-container-cards');
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full p-8 text-center text-slate-400 bg-white rounded-xl border border-slate-200"><i class="fa-solid fa-ghost text-2xl mb-2 block"></i> Geen data gevonden voor deze combinatie van vinkjes.</div>`;
                return;
            }

            const displayData = data.slice(0, 100);

            displayData.forEach((item, index) => {
                let vak = item[colVak] || 'Algemeen';
                let domein = item[colDomein] || '';
                let doel = item[colDoel] || 'Geen omschrijving';
                let niveau = item[colNiveau] || '';

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-500 flex flex-col justify-between hover:shadow-md transition";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3 gap-2">
                            <span class="bg-indigo-50 text-indigo-700 text-2xs font-bold px-2 py-1 rounded-md uppercase tracking-wider">${vak}</span>
                            <span class="text-slate-400 text-3xs font-mono text-right mt-1 leading-tight">${niveau}</span>
                        </div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">${domein}</h4>
                        <p class="text-sm font-medium text-slate-800 leading-relaxed">${doel}</p>
                    </div>
                `;
                container.appendChild(card);
            });
            
            if(data.length > 100) {
                container.innerHTML += `<div class="col-span-full p-4 text-center text-xs text-slate-500 bg-indigo-50/50 rounded-xl border border-indigo-100">Er zijn nog ${data.length - 100} extra resultaten. Vink specifieker aan om ze te zien.</div>`;
            }
        }

        function renderMatrix(data) {
            const container = document.getElementById('view-container-matrix');
            if(data.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-400"><i class="fa-solid fa-ghost text-2xl mb-2 block"></i> Geen data gevonden voor deze combinatie van vinkjes.</div>`;
                return;
            }

            const headers = Object.keys(data[0]);
            let html = `<table class="w-full text-left text-xs border-collapse"><thead><tr class="bg-slate-100 border-b border-slate-200">`;
            
            headers.forEach(h => {
                html += `<th class="p-3 font-bold text-slate-700 whitespace-nowrap">${h}</th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-slate-100">`;

            data.slice(0, 200).forEach(row => {
                html += `<tr class="hover:bg-slate-50 transition align-top">`;
                headers.forEach(h => {
                    html += `<td class="p-3 text-slate-600 max-w-[200px] truncate" title="${row[h]}">${row[h] || '-'}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            if(data.length > 200) html += `<div class="p-3 text-center text-xs text-slate-500 bg-indigo-50/50 border-t border-indigo-100">Tabel afgekapt op 200 rijen wegens prestaties.</div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
