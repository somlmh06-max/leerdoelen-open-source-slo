<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLO Leerdoelenkaart Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-indigo-700 text-white shadow-md p-6 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight"><i class="fa-solid fa-graduation-cap mr-3"></i>SLO Leerdoelen Dashboard</h1>
        <p class="text-indigo-150 mt-2 text-sm md:text-base">Genereer live visuele leerdoelkaarten voor de bovenbouw en onderbouw.</p>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center">
                <i class="fa-solid fa-sliders text-indigo-600 mr-2"></i> Stel je filters in
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">1. Fase</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="border border-slate-200 rounded-xl p-3 flex items-center justify-center cursor-pointer hover:bg-slate-50 peer-checked:border-indigo-600 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-600 transition">
                            <input type="radio" name="fase" value="ob" checked class="sr-only">
                            <span class="text-sm font-medium">Onderbouw (1-3)</span>
                        </label>
                        <label class="border border-slate-200 rounded-xl p-3 flex items-center justify-center cursor-pointer hover:bg-slate-50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-600 transition">
                            <input type="radio" name="fase" value="bb" class="sr-only">
                            <span class="text-sm font-medium">Bovenbouw (Examen)</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label for="niveau" class="block text-sm font-semibold text-slate-700 mb-2">2. Niveau</label>
                    <select id="niveau" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-600 transition">
                        <option value="vmbo">vmbo (Basis / Kader / TL)</option>
                        <option value="havo" selected>havo</option>
                        <option value="vwo">vwo / gymnasium</option>
                    </select>
                </div>

                <div>
                    <label for="vak" class="block text-sm font-semibold text-slate-700 mb-2">3. Vaknaam</label>
                    <div class="relative">
                        <i class="fa-solid fa-book-open absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="text" id="vak" placeholder="bijv. wiskunde, duits, engels" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 p-3 text-sm focus:outline-none focus:border-indigo-600 transition">
                    </div>
                </div>
            </div>

            <button onclick="fetchSLOData()" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-sm flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-bolt"></i> Genereer Kaarten
            </button>
        </div>

        <div id="status" class="hidden text-center p-6 rounded-xl mb-6 font-medium text-sm"></div>

        <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </main>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-xs border-t border-slate-800">
        Live verbonden met de openbare SLO Curriculum API.
    </footer>

    <script>
        async function fetchSLOData() {
            const grid = document.getElementById('cards-grid');
            const status = document.getElementById('status');
            const vakInput = document.getElementById('vak').value.trim().toLowerCase();
            const niveauSelect = document.getElementById('niveau').value;
            const faseRadio = document.querySelector('input[name="fase"]:checked').value;

            // UI Reset
            grid.innerHTML = '';
            status.className = "text-center p-6 rounded-xl mb-6 font-medium text-sm bg-blue-50 text-blue-700 block animate-pulse";
            status.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Live data ophalen uit de SLO database...`;

            if(!vakInput) {
                status.className = "text-center p-6 rounded-xl mb-6 font-medium text-sm bg-amber-50 text-amber-700 block";
                status.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Type eerst een vaknaam in om gericht te zoeken.`;
                return;
            }

            // GraphQL Query naar SLO
            const graphqlQuery = {
                query: `{
                    Doel(limit: 300) {
                        id
                        title
                        prefix
                        Doelniveau {
                            title
                        }
                    }
                }`
            };

            try {
                const response = await fetch('https://opendata.slo.nl/curriculum/api/v1/graphql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(graphqlQuery)
                });

                const result = await response.json();
                const doelen = result.data.Doel;

                // Filteren aan de client-side
                const gefilterdeDoelen = doelen.filter(item => {
                    const prefix = item.prefix ? item.prefix.toLowerCase() : "";
                    const titel = item.title ? item.title.toLowerCase() : "";
                    const niveauContext = (item.Doelniveau && item.Doelniveau[0]) ? item.Doelniveau[0].title.toLowerCase() : "";

                    const matchVak = prefix.includes(vakInput) || titel.includes(vakInput);
                    const matchFase = prefix.includes(faseRadio) || niveauContext.includes(faseRadio);
                    const matchNiveau = prefix.includes(niveauSelect) || niveauContext.includes(niveauSelect);

                    return matchVak && matchFase && matchNiveau;
                });

                if (gefilterdeDoelen.length === 0) {
                    status.className = "text-center p-6 rounded-xl mb-6 font-medium text-sm bg-slate-100 text-slate-700 block";
                    status.innerHTML = `<i class="fa-solid fa-magnifying-glass mr-2"></i> Geen unieke doelen gevonden voor deze combinatie. Probeer een kortere zoekterm (bijv. 'bio' i.p.v. 'biologie').`;
                    return;
                }

                // Succes! Verberg status en bouw kaarten
                status.className = "hidden";
                
                gefilterdeDoelen.forEach(doel => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl border border-slate-200 shadow-xs hover:shadow-md transition-all p-6 flex flex-col justify-between border-l-4 border-l-indigo-600";
                    
                    const niveauLabel = (doel.Doelniveau &&  doel.Doelniveau[0]) ? doel.Doelniveau[0].title : `${faseRadio.toUpperCase()} ${niveauSelect.toUpperCase()}`;
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-md tracking-wide uppercase">${doel.prefix || 'DOEL'}</span>
                                <span class="text-slate-400 text-2xs font-mono">ID: ${doel.id.substring(0,8)}</span>
                            </div>
                            <p class="text-slate-800 text-sm font-medium leading-relaxed">${doel.title}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between text-xs text-slate-500">
                            <span><i class="fa-solid fa-layer-group mr-1.5 text-slate-400"></i>${niveauLabel}</span>
                            <button onclick="this.closest('.bg-white').classList.toggle('bg-emerald-50')" class="text-slate-400 hover:text-emerald-600 transition cursor-pointer" title="Markeer als behandeld">
                                <i class="fa-regular fa-square-check text-base"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                status.className = "text-center p-6 rounded-xl mb-6 font-medium text-sm bg-rose-50 text-rose-700 block";
                status.innerHTML = `<i class="fa-solid fa-circle-xmark mr-2"></i> Er ging iets fout bij de API-aanvraag: ${error.message}`;
            }
        }
    </script>
</body>
</html>
